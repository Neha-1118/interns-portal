<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= HEADER ================= -->

<header class="header">

    <div class="logo">
        Internship Portal
    </div>

    <div class="user">
        Welcome, Applicant
    </div>

</header>

<!-- ================= SIDEBAR ================= -->

<aside class="sidebar">

    <ul>

        <li><a href="index.html">🏠 Dashboard</a></li>

        <li><a href="personal.html">👤 Personal Details</a></li>

        <li><a href="education.html" class="active">🎓 Education</a></li>

        <li><a href="experience.html">💼 Work Experience</a></li>

        <li><a href="skills.html">💻 Skills</a></li>

        <li><a href="resume.html">📄 Resume</a></li>

    </ul>

</aside>

<!-- ================= CONTENT ================= -->

<main class="content">

    <h1 class="page-title">Education Details</h1>

    <p class="page-subtitle">
        Enter your academic qualifications accurately.
    </p>

    <form>

        <!-- Graduation -->

        <div class="card">

            <h2>Graduation Details</h2>

            <br>

            <div class="row">

                <div class="col form-group">
                    <label>College / University</label>
                    <input type="text" placeholder="Enter college name">
                </div>

                <div class="col form-group">
                    <label>University</label>
                    <input type="text" placeholder="Enter university name">
                </div>

            </div>

            <div class="row">

                <div class="col form-group">
                    <label>Degree</label>
                    <input type="text" placeholder="BCA / B.Tech / B.Sc">
                </div>

                <div class="col form-group">
                    <label>Branch / Specialization</label>
                    <input type="text" placeholder="Computer Applications">
                </div>

            </div>

            <div class="row">

                <div class="col form-group">
                    <label>Current Year</label>

                    <select>
                        <option>Select Year</option>
                        <option>1st Year</option>
                        <option>2nd Year</option>
                        <option>3rd Year</option>
                        <option>Final Year</option>
                        <option>Graduate</option>
                    </select>

                </div>

                <div class="col form-group">
                    <label>Current Semester</label>
                    <input type="number" placeholder="Semester">
                </div>

            </div>

            <div class="row">

                <div class="col form-group">
                    <label>CGPA / Percentage</label>
                    <input type="text" placeholder="Example: 8.75 CGPA">
                </div>

                <div class="col form-group">
                    <label>Expected Graduation Year</label>
                    <input type="number" placeholder="2027">
                </div>

            </div>

            <div class="form-group">
                <label>Current Backlogs</label>

                <select>
                    <option>No</option>
                    <option>Yes</option>
                </select>
            </div>

        </div>

        <!-- Class 12 -->

        <div class="card">

            <h2>Class 12 Details</h2>

            <br>

            <div class="row">

                <div class="col form-group">
                    <label>Board</label>
                    <input type="text" placeholder="CBSE / State Board">
                </div>

                <div class="col form-group">
                    <label>School Name</label>
                    <input type="text" placeholder="Enter school name">
                </div>

            </div>

            <div class="row">

                <div class="col form-group">
                    <label>Percentage</label>
                    <input type="text" placeholder="85%">
                </div>

                <div class="col form-group">
                    <label>Passing Year</label>
                    <input type="number" placeholder="2023">
                </div>

            </div>

        </div>

        <!-- Class 10 -->

        <div class="card">

            <h2>Class 10 Details</h2>

            <br>

            <div class="row">

                <div class="col form-group">
                    <label>Board</label>
                    <input type="text" placeholder="CBSE / State Board">
                </div>

                <div class="col form-group">
                    <label>School Name</label>
                    <input type="text" placeholder="Enter school name">
                </div>

            </div>

            <div class="row">

                <div class="col form-group">
                    <label>Percentage</label>
                    <input type="text" placeholder="90%">
                </div>

                <div class="col form-group">
                    <label>Passing Year</label>
                    <input type="number" placeholder="2021">
                </div>

            </div>

        </div>

        <!-- Buttons -->

        <div style="display:flex;justify-content:space-between;margin-top:20px;">

            <a href="personal.html" class="btn btn-secondary">
                ← Previous
            </a>

            <a href="experience.html" class="btn">
                Save & Next →
            </a>

        </div>

    </form>

</main>

</body>
</html>
