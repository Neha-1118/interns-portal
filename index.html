<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Internship Application Form</h1>

    <form>
         <!-- Personal Details -->
        <h2>Personal Details</h2>

        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" required>

        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter your phone number" required>

        <label>Date of Birth</label>
        <input type="date">

        <label>Gender</label>
        <select>
            <option>Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Address</label>
        <textarea placeholder="Enter your address"></textarea>

        <label>City</label>
        <input type="text" placeholder="Enter your city">

        <label>State</label>
        <input type="text" placeholder="Enter your state">

        <label>PIN Code</label>
        <input type="text" placeholder="Enter PIN Code">

        <!-- Education Details -->
        <h2>Education Details</h2>

        <label>College Name</label>
        <input type="text" placeholder="Ex: Enter college name">

        <label>Degree</label>
        <input type="text" placeholder="Ex: BCA">

        <label>Branch / Specialization</label>
        <input type="text" placeholder="Ex: Computer Applications">

        <label>Current Year</label>
         <select>
            <label> select year </label>
         <!--<option>Select Year</option> -->
        placeholder=  
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>Final Year</option>
            <option>Graduate</option>
        </select>

        <label>CGPA/Percentage</label>
        <input type="text" placeholder="Ex:8.5 CGPA">

        <label>Graduation Year</label>
        <input type="number" placeholder="Ex:2027">

        <!-- Work Experience -->
        <h2>Work Experience</h2>

        <label>Experience</label>
        <select>
            <option>Fresher</option>
            <option>Experienced</option>
        </select>

        <label>Company Name</label>
        <input type="text" placeholder="Company Name">

        <label>Job Role</label>
        <input type="text" placeholder="Software Developer Intern">

        <label>Duration</label>
        <input type="text" placeholder="6 Months">

        <label>Responsibilities</label>
        <textarea placeholder="Describe your work experience"></textarea>

        <!-- Skills -->
        <h2>Skills</h2>

        <textarea placeholder="HTML, CSS, JavaScript, Java, SQL"></textarea>

        <!-- Resume -->
        <h2>Resume Upload</h2>

        <label>Upload Resume</label>
        <input type="file" accept=".pdf,.doc,.docx">

        <button type="submit">Submit Application</button>

    </form>
</div>
</body>
</html>
