<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="personal">

    <!-- HEADER -->

    <header class="header">

        <div class="logo">
            Internship Portal
        </div>

        <div class="user">
            Welcome, Applicant
        </div>

    </header>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <ul>

            <li><a href="index.html">🏠 Dashboard</a></li>

            <li><a href="personal.html" class="active">👤 Personal Details</a></li>

            <li><a href="education.html">🎓 Education</a></li>

            <li><a href="experience.html">💼 Work Experience</a></li>

            <li><a href="skills.html">💻 Skills</a></li>

            <li><a href="resume.html">📄 Resume</a></li>

        </ul>

    </aside>

    <!-- CONTENT -->

    <main class="content">

        <h1 class="page-title">Personal Details</h1>

        <p class="page-subtitle">
            Please provide your personal information accurately.
        </p>

        <div class="card">

            <form id="personalForm">

                <div class="row">

                    <div class="col form-group">
                        <label>First Name</label>
                        <input type="text" name="firstName" placeholder="Enter first name">
                    </div>

                    <div class="col form-group">
                        <label>Last Name</label>
                        <input type="text" name="lastName" placeholder="Enter last name">
                    </div>

                </div>

                <div class="row">

                    <div class="col form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="Enter email">
                    </div>

                    <div class="col form-group">
                        <label>Mobile Number</label>
                        <input type="tel" name="mobile" placeholder="Enter mobile number">
                    </div>

                </div>

                <div class="row">

                    <div class="col form-group">
                        <label>Date of Birth</label>
                        <input type="date" name="dob">
                    </div>

                    <div class="col form-group">
                        <label>Gender</label>

                        <select name="gender">
                            <option>Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>

                    </div>

                </div>

                <div class="form-group">

                    <label>Address</label>

                    <textarea name="address" placeholder="Enter your address"></textarea>

                </div>

                <div class="row">

                    <div class="col form-group">
                        <label>City</label>
                        <input type="text" name="city" placeholder="Enter city">
                    </div>

                    <div class="col form-group">
                        <label>State</label>
                        <input type="text" name="state" placeholder="Enter state">
                    </div>

                </div>

                <div class="row">

                    <div class="col form-group">
                        <label>PIN Code</label>
                        <input type="text" name="pincode" placeholder="Enter PIN Code">
                    </div>

                    <div class="col form-group">
                        <label>Nationality</label>
                        <input type="text" name="nationality" placeholder="Enter nationality">
                    </div>

                </div>

                <div class="row">

                    <div class="col form-group">
                        <label>Aadhaar Number</label>
                        <input type="text" name="aadhaar" placeholder="XXXX XXXX XXXX">
                    </div>

                    <div class="col form-group">
                        <label>LinkedIn Profile</label>
                        <input type="url" name="linkedin" data-optional placeholder="https://linkedin.com/in/yourprofile">
                    </div>

                </div>

                <div style="display:flex; justify-content:space-between; margin-top:20px;">

                    <a href="index.html" class="btn btn-secondary">
                        ← Back
                    </a>

                    <a href="education.html" id="save-next" class="btn">
                        Save & Next →
                    </a>

                </div>

            </form>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
